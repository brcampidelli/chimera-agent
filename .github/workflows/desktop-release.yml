name: Build desktop installers

# Builds the SELF-CONTAINED native desktop app (Tauri shell + a PyInstaller-frozen backend sidecar)
# for Windows / macOS / Linux and attaches the installers to the GitHub Release. The INSTALLERS are
# still UNSIGNED (no code-signing cert), so first-run shows a SmartScreen/Gatekeeper warning — that is
# expected and called out in the release notes. What IS signed here is the UPDATER: with
# `bundle.createUpdaterArtifacts: true` the build emits per-platform update bundles + Minisign `.sig`
# files (using the TAURI_SIGNING_PRIVATE_KEY secret), and a final job assembles a `latest.json` manifest
# and publishes it to the Release so the app's in-place auto-updater can find + verify updates.
# This CI is the ONLY verifier of the native build: it is not smoke-tested on the maintainer's machine
# (no local MSVC/Rust toolchain). The PyPI wheel path is unaffected — the frozen sidecar and the
# updater live only in these installers, never in the wheel.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write # attach installer assets to the release

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.bundles }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis
            updater_target: windows-x86_64
          - os: macos-latest
            bundles: app,dmg
            updater_target: darwin-aarch64
          # Intel Macs. `macos-latest` is arm64-only, so without this an Intel Mac literally cannot
          # install (an aarch64 dmg won't run) and gets no updater entry. The frozen PyInstaller
          # sidecar is arch-specific, so a "universal" Tauri build wouldn't help — the backend must
          # be built ON an Intel runner. NOTE: macos-13 was retired (Dec 2025); `macos-15-intel` is
          # the last x86_64 image and is scheduled to go away ~Aug 2027, after which GitHub Actions
          # drops macOS x86_64 entirely. Revisit before then.
          - os: macos-15-intel
            bundles: app,dmg
            updater_target: darwin-x86_64
          - os: ubuntu-latest
            bundles: appimage,deb
            updater_target: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/desktop

      - name: Build the SPA (into apps/desktop/dist)
        run: npm --prefix apps/desktop run build

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # The frozen sidecar bundles the real backend (chimera + [desktop] extra) + PyInstaller. Freeze
      # it BEFORE the Tauri build, since tauri.conf bundles src-tauri/sidecar-dist as a resource.
      # Editable install (uv sync) matches the locally-proven freeze: --collect-data chimera reads the
      # source tree (no _desktop_dist) and --add-data supplies the built SPA — no double-include clash.
      - name: Install the backend (editable) + PyInstaller
        run: |
          uv sync --extra desktop
          uv pip install pyinstaller

      - name: Freeze the backend sidecar
        run: uv run --no-sync python apps/desktop/src-tauri/build_sidecar.py

      - name: Verify the frozen sidecar exists
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            test -f apps/desktop/src-tauri/sidecar-dist/chimera-backend/chimera-backend.exe
          else
            test -f apps/desktop/src-tauri/sidecar-dist/chimera-backend/chimera-backend
          fi

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Linux system deps for Tauri
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Installers stay unsigned (no cert), but the UPDATER artifacts ARE signed here: these two secrets
      # let the bundler produce the Minisign `.sig` files next to each update bundle. Without them the
      # build would fail once createUpdaterArtifacts is on, so they must be present on release runs.
      - name: Build the Tauri app (signed updater artifacts)
        run: npm --prefix apps/desktop run tauri build -- --bundles ${{ matrix.bundles }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # BOTH macOS jobs (arm64 + Intel) emit an updater bundle named plainly `Chimera.app.tar.gz` —
      # the nsis (.exe) and AppImage names already carry their arch, but this one doesn't. Two jobs
      # uploading the same filename would collide as release assets and make both manifest entries
      # (darwin-aarch64 / darwin-x86_64) point at one file. Stamp the arch in before upload.
      - name: Stamp the arch into the macOS updater artifact
        if: runner.os == 'macOS'
        shell: bash
        env:
          TARGET: ${{ matrix.updater_target }}
        run: |
          set -euo pipefail
          d=apps/desktop/src-tauri/target/release/bundle/macos
          arch="${TARGET#darwin-}" # aarch64 | x86_64
          for f in "$d"/*.app.tar.gz; do
            [ -e "$f" ] || continue
            base=$(basename "$f" .app.tar.gz)
            case "$base" in *_"$arch") continue ;; esac # already stamped
            mv "$f" "$d/${base}_${arch}.app.tar.gz"
            [ -e "${f}.sig" ] && mv "${f}.sig" "$d/${base}_${arch}.app.tar.gz.sig"
          done
          ls -1 "$d"

      - name: Attach installers + signed updater artifacts to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          # Installers (nsis/dmg/appimage/deb) for fresh installs, PLUS the updater bundles + `.sig`
          # the in-place auto-updater downloads. On macOS the updater artifact is `*.app.tar.gz` (in the
          # macos/ subfolder), NOT the dmg. The `.sig` contents are embedded into latest.json below.
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.sig
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb

      # Emit a one-platform fragment { "<target>": { signature, url } } for latest.json. The `url` is
      # pinned to THIS release's tag (not /latest/) so the signature always matches the binary it names;
      # only the manifest filename itself is fetched via the stable /latest/download/latest.json endpoint.
      - name: Assemble updater manifest fragment
        if: github.event_name == 'release'
        shell: bash
        env:
          TARGET: ${{ matrix.updater_target }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # The UPDATER artifact per platform is nsis (.exe), macOS .app.tar.gz, or Linux .AppImage —
          # NOT the .deb (Tauri also signs the deb, but the Linux updater installs the AppImage, so a
          # deb url in latest.json would make Linux auto-update download an un-appliable package).
          # Exclude deb/ so `head -n1` can't pick the wrong signature.
          sig_file=$(find apps/desktop/src-tauri/target/release/bundle -name '*.sig' -not -path '*/deb/*' | head -n1)
          if [ -z "$sig_file" ]; then
            echo "ERROR: no updater .sig produced for $TARGET (createUpdaterArtifacts off, or signing env missing)" >&2
            exit 1
          fi
          name=$(basename "${sig_file%.sig}")
          url="https://github.com/brcampidelli/chimera-agent/releases/download/${TAG}/${name}"
          mkdir -p manifest-fragments
          # jq builds the JSON so newlines/quoting in the signature are handled correctly.
          jq -n --arg t "$TARGET" --arg s "$(cat "$sig_file")" --arg u "$url" \
            '{($t): {signature: $s, url: $u}}' > "manifest-fragments/${TARGET}.json"
          cat "manifest-fragments/${TARGET}.json"

      - name: Upload manifest fragment
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: manifest-fragment-${{ matrix.updater_target }}
          path: manifest-fragments/${{ matrix.updater_target }}.json
          if-no-files-found: error
          retention-days: 5

      - name: Upload installers as workflow artifacts (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: chimera-installers-${{ matrix.os }}
          path: apps/desktop/src-tauri/target/release/bundle/**/*
          if-no-files-found: warn
          retention-days: 5

  # After all platforms build, merge their fragments into ONE latest.json and publish it to the
  # Release. The updater endpoint (releases/latest/download/latest.json) resolves to the newest
  # release's copy of this file, whose per-platform urls are tag-pinned to that same release.
  manifest:
    name: Assemble & publish latest.json
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach latest.json to the release
    steps:
      - name: Download all manifest fragments
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-fragment-*
          path: fragments
          merge-multiple: true

      - name: Build latest.json
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
          NOTES: ${{ github.event.release.name }}
        run: |
          set -euo pipefail
          version="${TAG#v}" # updater compares MAJOR.MINOR.PATCH ints, so strip any leading 'v'
          if ! ls fragments/*.json >/dev/null 2>&1; then
            echo "ERROR: no manifest fragments found — no updater artifacts were produced" >&2
            exit 1
          fi
          platforms=$(jq -s 'add' fragments/*.json) # merge each {target:{...}} into one platforms map
          jq -n \
            --arg version "$version" \
            --arg notes "${NOTES:-Chimera $TAG}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$platforms" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json
          echo "--- latest.json ---"
          cat latest.json

      - name: Publish latest.json to the release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
