name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · type-check · test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # Include the desktop extra so mypy sees FastAPI's real types (without it, strict mode flags
        # every route decorator as untyped) and the desktop API tests actually run instead of skipping.
        run: uv sync --extra dev --extra desktop

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (strict type-check)
        run: uv run mypy chimera

      - name: Pytest
        run: uv run pytest -q

  integration:
    name: live integration (real provider)
    runs-on: ubuntu-latest
    needs: quality
    # Only on direct pushes to main (not fork PRs), where the secret is available.
    # The test self-skips when the secret is unset, so this job is green either way.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra mcp

      - name: Integration smoke test
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run pytest -m integration -q

  install-smoke:
    name: clean pip install (${{ matrix.os }} · py${{ matrix.python-version }})
    # `quality` uses `uv sync` (the locked resolution, which is clean everywhere). This job instead does
    # a FRESH `pip install` — pip re-resolves from PyPI and can backtrack a transitive (e.g. a litellm
    # dep) onto a version lacking a wheel for this OS/Python, falling to an sdist that needs a compiler.
    # Testing the extremes (Windows/macOS × oldest+newest supported Python) catches that class before a
    # user hits it. The wheel is pure-Python, so success here means "a plain `pip install` just works".
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Fresh pip install of the desktop extra (no uv, no lockfile)
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[desktop]"
      - name: Import smoke (core + desktop API) + CLI entrypoint
        run: |
          python -c "import chimera, chimera.api.app; print('chimera', chimera.__version__, 'import OK')"
          chimera --help

  desktop:
    name: desktop app (API types drift + build)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python deps (the desktop extra provides FastAPI for the schema)
        run: uv sync --extra dev --extra desktop

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/desktop

      - name: Regenerate the OpenAPI schema + TypeScript types
        run: |
          uv run python -m chimera.api.schema_dump > apps/desktop/openapi.json
          npm --prefix apps/desktop run gen:api

      # The drift gate: if the committed schema/types differ from a fresh regeneration, someone changed
      # a backend response model without running `gen:api`. Fail loudly with the fix.
      - name: Fail if the generated API types are stale
        run: |
          if ! git diff --quiet -- apps/desktop/openapi.json apps/desktop/src/lib/api-schema.ts; then
            echo "::error::Desktop API types are out of date. Run these and commit the result:"
            echo "  python -m chimera.api.schema_dump > apps/desktop/openapi.json"
            echo "  npm --prefix apps/desktop run gen:api"
            git --no-pager diff -- apps/desktop/openapi.json apps/desktop/src/lib/api-schema.ts
            exit 1
          fi

      - name: Build the frontend (tsc + vite — proves the UI matches the generated types)
        run: npm --prefix apps/desktop run build
