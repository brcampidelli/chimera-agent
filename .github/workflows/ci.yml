name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly mutation-testing run (Mondays 06:00 UTC). The mutation job self-gates to this + manual
    # dispatch; every other job below runs on push/PR as usual.
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · type-check · test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # Include the desktop extra so mypy sees FastAPI's real types (without it, strict mode flags
        # every route decorator as untyped) and the desktop API tests actually run instead of skipping.
        run: uv sync --extra dev --extra desktop

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (strict type-check)
        run: uv run mypy chimera

      - name: Pytest
        run: uv run pytest -q

  integration:
    name: live integration (real provider)
    runs-on: ubuntu-latest
    needs: quality
    # Only on direct pushes to main (not fork PRs), where the secret is available.
    # The test self-skips when the secret is unset, so this job is green either way.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        # `desktop` is needed even though this job only runs `-m integration`: pytest IMPORTS every
        # test module before the marker filter selects any, so the FastAPI-dependent suites make
        # collection die with ModuleNotFoundError before a single integration test is chosen.
        run: uv sync --extra dev --extra mcp --extra desktop

      - name: Integration smoke test
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run pytest -m integration -q

  install-smoke:
    name: clean pip install (${{ matrix.os }} · py${{ matrix.python-version }})
    # `quality` uses `uv sync` against the committed uv.lock — a pinned resolution, identical on every
    # run. This job instead does a FRESH `pip install`, which re-resolves from PyPI and can land on a
    # version lacking a wheel for this OS/Python, falling to an sdist that needs a compiler. That is not
    # hypothetical: litellm 1.92 went manylinux-only, which is why the dependency now carries a ceiling.
    # Testing the extremes (Windows/macOS × oldest+newest supported Python) catches that class before a
    # user hits it. The wheel is pure-Python, so success here means "a plain `pip install` just works".
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Fresh pip install of the desktop extra (no uv, no lockfile)
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[desktop]"
      - name: Import smoke (core + desktop API) + CLI entrypoint
        run: |
          python -c "import chimera, chimera.api.app; print('chimera', chimera.__version__, 'import OK')"
          chimera --help

  desktop:
    name: desktop app (API types drift + tests + build)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python deps (the desktop extra provides FastAPI for the schema)
        run: uv sync --extra dev --extra desktop

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/desktop

      - name: Regenerate the OpenAPI schema + TypeScript types
        run: |
          uv run python -m chimera.api.schema_dump > apps/desktop/openapi.json
          npm --prefix apps/desktop run gen:api

      # The drift gate: if the committed schema/types differ from a fresh regeneration, someone changed
      # a backend response model without running `gen:api`. Fail loudly with the fix.
      - name: Fail if the generated API types are stale
        run: |
          if ! git diff --quiet -- apps/desktop/openapi.json apps/desktop/src/lib/api-schema.ts; then
            echo "::error::Desktop API types are out of date. Run these and commit the result:"
            echo "  python -m chimera.api.schema_dump > apps/desktop/openapi.json"
            echo "  npm --prefix apps/desktop run gen:api"
            git --no-pager diff -- apps/desktop/openapi.json apps/desktop/src/lib/api-schema.ts
            exit 1
          fi

      - name: Component tests (Vitest + Testing Library — guards user-visible UI behaviour)
        run: npm --prefix apps/desktop run test

      - name: Build the frontend (tsc + vite — proves the UI matches the generated types)
        run: npm --prefix apps/desktop run build

  mutation:
    name: mutation testing (critical modules)
    runs-on: ubuntu-latest
    # Slow (hundreds of mutants). Weekly + on demand only — NOT on every push/PR. The gate is that
    # every surviving mutant is a justified allowlist entry (see MUTATION.md / scripts/mutation_gate.py).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Placeholder SPA dist
        # Hatchling force-includes apps/desktop/dist for the [desktop] packaging; the mutation gate
        # only touches chimera/*.py, so a placeholder satisfies the include without building the UI.
        run: mkdir -p apps/desktop/dist && touch apps/desktop/dist/.gitkeep

      - name: Install deps (dev provides mutmut; desktop provides FastAPI for the api modules)
        run: uv sync --extra dev --extra desktop

      - name: Run mutmut on the critical modules
        # Mutates only the five modules in [tool.mutmut].only_mutate, against their focused tests.
        # mutmut always exits 0 — the gate below is what turns survivors into a failure.
        run: uv run mutmut run

      - name: Gate — every survivor must be a justified allowlist entry
        run: uv run python scripts/mutation_gate.py
